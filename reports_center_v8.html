<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALL WIN 報告中心 | 全勝集團</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Noto Sans TC', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #fff;
        }
        .login-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }
        .login-box {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 48px;
            text-align: center;
            max-width: 400px;
            width: 100%;
        }
        .logo { font-size: 48px; margin-bottom: 16px; }
        .login-box h1 { font-size: 24px; margin-bottom: 8px; }
        .login-box p { color: rgba(255,255,255,0.6); margin-bottom: 32px; }
        input[type="password"] {
            width: 100%;
            padding: 16px 20px;
            border: 2px solid rgba(255,255,255,0.2);
            border-radius: 12px;
            background: rgba(255,255,255,0.05);
            color: #fff;
            font-size: 16px;
            outline: none;
            transition: all 0.3s;
        }
        input[type="password"]:focus {
            border-color: #4facfe;
            background: rgba(255,255,255,0.1);
        }
        .btn {
            width: 100%;
            padding: 16px;
            margin-top: 16px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn-primary {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: #1a1a2e;
        }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(79,172,254,0.4); }
        .error { color: #ff6b6b; margin-top: 12px; font-size: 14px; display: none; }
        
        .dashboard { display: none; padding: 24px; max-width: 1400px; margin: 0 auto; }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 32px;
            flex-wrap: wrap;
            gap: 16px;
        }
        .header h1 { font-size: 28px; }
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 32px;
        }
        .stat-card {
            background: rgba(255,255,255,0.08);
            border-radius: 16px;
            padding: 24px;
            text-align: center;
        }
        .stat-card .number { font-size: 36px; font-weight: 700; color: #4facfe; }
        .stat-card .label { color: rgba(255,255,255,0.6); margin-top: 8px; }
        
        .filters {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }
        .filter-btn {
            padding: 10px 20px;
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 20px;
            background: transparent;
            color: rgba(255,255,255,0.7);
            cursor: pointer;
            transition: all 0.3s;
        }
        .filter-btn:hover, .filter-btn.active {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: #1a1a2e;
            border-color: transparent;
        }
        
        .reports-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
        }
        .report-card {
            background: rgba(255,255,255,0.05);
            border-radius: 16px;
            padding: 24px;
            transition: all 0.3s;
            cursor: pointer;
            border: 1px solid transparent;
        }
        .report-card:hover {
            background: rgba(255,255,255,0.1);
            border-color: rgba(79,172,254,0.3);
            transform: translateY(-4px);
        }
        .report-category {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 12px;
        }
        .cat-daily { background: rgba(79,172,254,0.2); color: #4facfe; }
        .cat-weekly { background: rgba(155,89,182,0.2); color: #9b59b6; }
        .cat-market { background: rgba(46,204,113,0.2); color: #2ecc71; }
        .cat-marketing { background: rgba(241,196,15,0.2); color: #f1c40f; }
        .cat-investment { background: rgba(231,76,60,0.2); color: #e74c3c; }
        .cat-finance { background: rgba(52,152,219,0.2); color: #3498db; }
        .cat-reports { background: rgba(255,255,255,0.1); color: #fff; }
        
        .report-title { font-size: 16px; font-weight: 600; margin-bottom: 8px; line-height: 1.4; }
        .report-date { color: rgba(255,255,255,0.5); font-size: 14px; margin-bottom: 12px; }
        .report-desc { color: rgba(255,255,255,0.7); font-size: 14px; line-height: 1.5; }
        .report-link {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            margin-top: 16px;
            color: #4facfe;
            font-size: 14px;
            font-weight: 500;
        }
        
        .loading { text-align: center; padding: 60px; color: rgba(255,255,255,0.6); }
        .spinner {
            width: 48px; height: 48px;
            border: 3px solid rgba(255,255,255,0.1);
            border-top-color: #4facfe;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 16px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .no-reports { text-align: center; padding: 60px; color: rgba(255,255,255,0.5); }
        
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 1000; align-items: center; justify-content: center; padding: 20px; }
        .modal.show { display: flex; }
        .modal-content { background: #1a1a2e; border-radius: 20px; max-width: 600px; width: 100%; max-height: 90vh; overflow: auto; }
        .modal-header { padding: 24px; border-bottom: 1px solid rgba(255,255,255,0.1); display: flex; justify-content: space-between; align-items: center; }
        .modal-close { background: none; border: none; color: rgba(255,255,255,0.6); font-size: 28px; cursor: pointer; }
        .modal-body { padding: 24px; }
        .modal-body h3 { margin-bottom: 16px; }
        .modal-body p { color: rgba(255,255,255,0.7); line-height: 1.6; margin-bottom: 12px; }
        .btn-download {
            display: inline-flex; align-items: center; gap: 8px;
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: #1a1a2e; padding: 12px 24px; border-radius: 10px;
            text-decoration: none; font-weight: 600; margin-top: 16px;
        }
    </style>
</head>
<body>
    <div class="login-screen" id="loginScreen">
        <div class="login-box">
            <div class="logo">📊</div>
            <h1>ALL WIN 報告中心</h1>
            <p>全勝集團智能報告系統 v8.0</p>
            <input type="password" id="passwordInput" placeholder="請輸入訪問密碼" onkeypress="if(event.key==='Enter')verifyPassword()">
            <button class="btn btn-primary" onclick="verifyPassword()">進入系統</button>
            <div class="error" id="errorMsg">密碼錯誤，請重新輸入</div>
        </div>
    </div>
    
    <div class="dashboard" id="dashboard">
        <div class="header">
            <h1>📊 ALL WIN 報告中心</h1>
            <div style="color: rgba(255,255,255,0.6);">最後更新：<span id="lastUpdated">載入中...</span></div>
        </div>
        
        <div class="stats">
            <div class="stat-card">
                <div class="number" id="totalCount">-</div>
                <div class="label">總報告數</div>
            </div>
            <div class="stat-card">
                <div class="number" id="todayCount">-</div>
                <div class="label">今日更新</div>
            </div>
            <div class="stat-card">
                <div class="number" id="weekCount">-</div>
                <div class="label">本週報告</div>
            </div>
        </div>
        
        <div class="filters" id="filters">
            <button class="filter-btn active" data-category="all">全部</button>
            <button class="filter-btn" data-category="daily">每日報告</button>
            <button class="filter-btn" data-category="weekly">每週報告</button>
            <button class="filter-btn" data-category="market">市場報告</button>
            <button class="filter-btn" data-category="marketing">營銷報告</button>
            <button class="filter-btn" data-category="investment">投資報告</button>
            <button class="filter-btn" data-category="finance">財務報告</button>
            <button class="filter-btn" data-category="reports">綜合報告</button>
        </div>
        
        <div class="reports-grid" id="reportsGrid">
            <div class="loading"><div class="spinner"></div><div>載入報告中...</div></div>
        </div>
    </div>
    
    <div class="modal" id="previewModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">報告預覽</h2>
                <button class="modal-close" onclick="closeModal()">&times;</button>
            </div>
            <div class="modal-body" id="modalBody"></div>
        </div>
    </div>

    <script>
        const correctHash = 'a665a45920422f9d417e4867efdc4fb8a04a1f3fff1fa07e998e86f7f7a27ae3';
        let allReports = [];
        
        async function verifyPassword() {
            const input = document.getElementById('passwordInput').value;
            const hashBuffer = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(input));
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            const hashHex = hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
            
            if (hashHex === correctHash) {
                sessionStorage.setItem('auth', 'true');
                showDashboard();
            } else {
                document.getElementById('errorMsg').style.display = 'block';
                document.getElementById('passwordInput').value = '';
            }
        }
        
        function showDashboard() {
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('dashboard').style.display = 'block';
            loadReports();
        }
        
        async function loadReports() {
            try {
                const response = await fetch('reports.json?t=' + Date.now());
                if (!response.ok) throw new Error('無法載入報告');
                const data = await response.json();
                allReports = data.recentReports || [];
                document.getElementById('lastUpdated').textContent = new Date(data.lastUpdated).toLocaleString('zh-TW');
                updateStats();
                renderReports('all');
            } catch (error) {
                console.error('載入失敗:', error);
                document.getElementById('reportsGrid').innerHTML = '<div class="no-reports"><p>⚠️ 無法載入報告數據</p><p style="margin-top:8px;font-size:12px;">請確認 reports.json 文件存在</p></div>';
            }
        }
        
        function updateStats() {
            const today = new Date().toDateString();
            const weekAgo = new Date(Date.now() - 7 * 24 * 60 * 60 * 1000);
            document.getElementById('totalCount').textContent = allReports.length;
            document.getElementById('todayCount').textContent = allReports.filter(r => new Date(r.date).toDateString() === today).length;
            document.getElementById('weekCount').textContent = allReports.filter(r => new Date(r.date) >= weekAgo).length;
        }
        
        function renderReports(category) {
            const grid = document.getElementById('reportsGrid');
            const filtered = category === 'all' ? allReports : allReports.filter(r => r.category === category);
            if (filtered.length === 0) { grid.innerHTML = '<div class="no-reports">目前沒有此分類的報告</div>'; return; }
            grid.innerHTML = filtered.map(report => `
                <div class="report-card" onclick="showPreview('${report.id}')">
                    <span class="report-category cat-${report.category}">${getCategoryName(report.category)}</span>
                    <div class="report-title">${report.title}</div>
                    <div class="report-date">📅 ${report.date}</div>
                    <div class="report-desc">${report.description || '點擊查看詳情'}</div>
                    <div class="report-link">📥 下載報告 →</div>
                </div>
            `).join('');
        }
        
        function getCategoryName(cat) {
            const names = {daily:'每日報告',weekly:'每週報告',market:'市場報告',marketing:'營銷報告',investment:'投資報告',finance:'財務報告',reports:'綜合報告'};
            return names[cat] || cat;
        }
        
        function showPreview(reportId) {
            const report = allReports.find(r => r.id === reportId);
            if (!report) return;
            document.getElementById('modalTitle').textContent = report.title;
            document.getElementById('modalBody').innerHTML = `
                <h3>📋 ${report.title}</h3>
                <p><strong>分類：</strong>${getCategoryName(report.category)}</p>
                <p><strong>日期：</strong>${report.date}</p>
                <p>${report.description || '無描述'}</p>
                <a href="${report.filename}" class="btn-download" target="_blank">📥 下載 PDF 報告</a>
            `;
            document.getElementById('previewModal').classList.add('show');
        }
        
        function closeModal() { document.getElementById('previewModal').classList.remove('show'); }
        
        document.addEventListener('DOMContentLoaded', () => {
            if (sessionStorage.getItem('auth')) showDashboard();
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    renderReports(btn.dataset.category);
                });
            });
        });
        
        document.getElementById('previewModal').addEventListener('click', (e) => { if (e.target === document.getElementById('previewModal')) closeModal(); });
    </script>
</body>
</html>
