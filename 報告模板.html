<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{REPORT_TITLE}} - ALL WIN 報告</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Helvetica Neue", sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #e4e8ec 100%);
            min-height: 100vh;
            color: #1d1d1f;
            line-height: 1.8;
        }

        /* 頂部工具欄 */
        .toolbar {
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: saturate(180%) blur(20px);
            -webkit-backdrop-filter: saturate(180%) blur(20px);
            border-bottom: 1px solid rgba(0, 0, 0, 0.1);
            padding: 20px 48px;
            position: sticky;
            top: 0;
            z-index: 100;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .toolbar-left {
            display: flex;
            align-items: center;
            gap: 24px;
        }

        .back-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 20px;
            color: #0071e3;
            text-decoration: none;
            cursor: pointer;
            transition: opacity 0.3s;
        }

        .back-btn:hover {
            opacity: 0.7;
        }

        .report-title {
            font-size: 28px;
            font-weight: 700;
            color: #1d1d1f;
        }

        .toolbar-right {
            display: flex;
            gap: 16px;
        }

        .btn {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 14px 28px;
            border-radius: 12px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            border: none;
        }

        .btn-primary {
            background: #0071e3;
            color: white;
        }

        .btn-primary:hover {
            background: #0077ed;
            transform: translateY(-2px);
        }

        .btn-secondary {
            background: white;
            color: #1d1d1f;
            border: 2px solid #e5e5e7;
        }

        .btn-secondary:hover {
            border-color: #0071e3;
            color: #0071e3;
        }

        /* 主內容 */
        .main-content {
            max-width: 1100px;
            margin: 0 auto;
            padding: 48px;
        }

        /* 報告資訊卡 */
        .report-info {
            background: white;
            border-radius: 24px;
            padding: 40px;
            margin-bottom: 40px;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.06);
        }

        .report-badge {
            display: inline-block;
            background: #f5f5f7;
            color: #1d1d1f;
            font-size: 18px;
            font-weight: 600;
            padding: 10px 20px;
            border-radius: 12px;
            margin-bottom: 20px;
        }

        .report-main-title {
            font-size: 42px;
            font-weight: 700;
            color: #1d1d1f;
            line-height: 1.3;
            margin-bottom: 24px;
        }

        .report-meta-info {
            display: flex;
            flex-wrap: wrap;
            gap: 32px;
            padding-top: 24px;
            border-top: 1px solid #e5e5e7;
        }

        .meta-item {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .meta-icon {
            font-size: 28px;
        }

        .meta-text {
            font-size: 20px;
            color: #86868b;
        }

        .meta-value {
            font-size: 22px;
            font-weight: 600;
            color: #1d1d1f;
        }

        /* 報告內容區 */
        .report-content {
            background: white;
            border-radius: 24px;
            padding: 56px;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.06);
        }

        /* 大標題 */
        .content-section {
            margin-bottom: 48px;
        }

        .content-section:last-child {
            margin-bottom: 0;
        }

        .section-heading {
            font-size: 34px;
            font-weight: 700;
            color: #1d1d1f;
            margin-bottom: 28px;
            padding-bottom: 16px;
            border-bottom: 3px solid #0071e3;
        }

        /* 段落文字 */
        .paragraph {
            font-size: 22px;
            color: #1d1d1f;
            margin-bottom: 24px;
            text-align: justify;
        }

        /* 列表 */
        .list {
            list-style: none;
            padding: 0;
        }

        .list-item {
            font-size: 22px;
            color: #1d1d1f;
            padding: 18px 0;
            padding-left: 36px;
            position: relative;
            border-bottom: 1px solid #f5f5f7;
        }

        .list-item:last-child {
            border-bottom: none;
        }

        .list-item::before {
            content: '•';
            position: absolute;
            left: 0;
            color: #0071e3;
            font-size: 28px;
            font-weight: bold;
        }

        .list-item-highlight {
            background: linear-gradient(120deg, #e8f4fd 0%, #d4ecfc 100%);
            border-radius: 12px;
            padding: 18px 18px 18px 36px;
            margin: 12px 0;
        }

        /* 數據卡片 */
        .data-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 24px;
            margin: 32px 0;
        }

        .data-card {
            background: linear-gradient(135deg, #f8f9fa 0%, #ffffff 100%);
            border-radius: 20px;
            padding: 32px;
            border: 1px solid #e5e5e7;
        }

        .data-card-label {
            font-size: 18px;
            color: #86868b;
            margin-bottom: 12px;
        }

        .data-card-value {
            font-size: 36px;
            font-weight: 700;
            color: #1d1d1f;
        }

        .data-card-change {
            font-size: 18px;
            margin-top: 8px;
        }

        .data-card-change.up {
            color: #ff3b30;
        }

        .data-card-change.down {
            color: #34c759;
        }

        /* 表格 */
        .data-table {
            width: 100%;
            border-collapse: collapse;
            margin: 32px 0;
            font-size: 20px;
        }

        .data-table th {
            background: #f5f5f7;
            color: #1d1d1f;
            font-weight: 700;
            text-align: left;
            padding: 20px 24px;
            border-bottom: 2px solid #e5e5e7;
        }

        .data-table td {
            padding: 20px 24px;
            border-bottom: 1px solid #e5e5e7;
            color: #1d1d1f;
        }

        .data-table tr:hover {
            background: #f8f9fa;
        }

        /* 引用區塊 */
        .quote-block {
            background: linear-gradient(135deg, #e8f4fd 0%, #f0f7ff 100%);
            border-left: 6px solid #0071e3;
            border-radius: 0 16px 16px 0;
            padding: 32px 40px;
            margin: 32px 0;
        }

        .quote-text {
            font-size: 24px;
            color: #1d1d1f;
            font-style: italic;
            line-height: 1.6;
        }

        .quote-source {
            font-size: 18px;
            color: #86868b;
            margin-top: 16px;
            text-align: right;
        }

        /* 重點標註 */
        .highlight-box {
            background: linear-gradient(135deg, #fff9e6 0%, #fff3cc 100%);
            border-radius: 16px;
            padding: 32px;
            margin: 32px 0;
        }

        .highlight-title {
            font-size: 22px;
            font-weight: 700;
            color: #1d1d1f;
            margin-bottom: 16px;
        }

        .highlight-content {
            font-size: 20px;
            color: #1d1d1f;
        }

        /* 底部 */
        .footer {
            text-align: center;
            padding: 48px;
            color: #86868b;
            font-size: 18px;
        }

        /* 響應式 */
        @media (max-width: 768px) {
            .toolbar {
                padding: 16px 24px;
                flex-direction: column;
                gap: 16px;
            }

            .main-content {
                padding: 24px;
            }

            .report-main-title {
                font-size: 32px;
            }

            .report-content {
                padding: 32px;
            }

            .data-card-value {
                font-size: 28px;
            }
        }

        /* 打印樣式 */
        @media print {
            .toolbar {
                display: none;
            }

            body {
                background: white;
            }

            .report-content {
                box-shadow: none;
            }
        }
    </style>
</head>
<body>
    <!-- 工具欄 -->
    <div class="toolbar">
        <div class="toolbar-left">
            <a href="報告中心_v4.html" class="back-btn">
                <span>←</span>
                <span>返回報告中心</span>
            </a>
            <h1 class="report-title">{{REPORT_TITLE}}</h1>
        </div>
        <div class="toolbar-right">
            <button class="btn btn-secondary" onclick="window.print()">
                <span>🖨️</span>
                <span>列印</span>
            </button>
            <button class="btn btn-primary" onclick="downloadPDF()">
                <span>⬇️</span>
                <span>下載 PDF</span>
            </button>
        </div>
    </div>

    <!-- 主內容 -->
    <main class="main-content">
        <!-- 報告資訊 -->
        <div class="report-info">
            <span class="report-badge">{{REPORT_TYPE}}</span>
            <h1 class="report-main-title">{{REPORT_TITLE}}</h1>
            <div class="report-meta-info">
                <div class="meta-item">
                    <span class="meta-icon">📅</span>
                    <span class="meta-text">日期</span>
                    <span class="meta-value">{{REPORT_DATE}}</span>
                </div>
                <div class="meta-item">
                    <span class="meta-icon">👤</span>
                    <span class="meta-text">負責人</span>
                    <span class="meta-value">{{REPORT_AUTHOR}}</span>
                </div>
                <div class="meta-item">
                    <span class="meta-icon">📂</span>
                    <span class="meta-text">分類</span>
                    <span class="meta-value">{{REPORT_CATEGORY}}</span>
                </div>
            </div>
        </div>

        <!-- 報告內容 -->
        <div class="report-content">
            {{REPORT_CONTENT}}
        </div>
    </main>

    <!-- 底部 -->
    <footer class="footer">
        © 2026 ALL WIN 全勝集團 · 報告中心
    </footer>

    <script>
        function downloadPDF() {
            // 使用瀏覽器列印功能轉 PDF
            window.print();
        }
    </script>
</body>
</html>
